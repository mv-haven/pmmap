# Render Blueprint: one Web Service + one managed Postgres.
# Deploy by pushing this repo to GitHub and creating a Blueprint on Render.
services:
  - type: web
    name: pmmap
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VOTE_THRESHOLD
        value: "10"
      - key: ADMIN_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pmmap-db
          property: connectionString

databases:
  - name: pmmap-db
    plan: free
